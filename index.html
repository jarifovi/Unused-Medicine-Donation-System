<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDonate Pro — Intelligent Medicine Redistribution</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #7c3aed; 
            --primary-light: #a78bfa;
            --accent: #06b6d4;
            --accent2: #f472b6;
            --bg: #06050f; 
            --glass: rgba(124, 58, 237, 0.06);
            --glass-border: rgba(124, 58, 237, 0.15);
            --text-main: #f0eeff;
            --text-dim: #8b83b0;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(124,58,237,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(6,182,212,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244,114,182,0.05) 0%, transparent 70%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            background: rgba(124, 58, 237, 0.1);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.1);
        }

        .navbar { 
            background: rgba(6, 5, 15, 0.85);
            backdrop-filter: blur(20px);
            padding: 1rem 0; 
            border-bottom: 1px solid var(--glass-border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary-light); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            letter-spacing: -0.5px;
        }

        .search-bar {
            background: rgba(124,58,237,0.08);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            color: white;
            width: 260px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn { 
            padding: 0.8rem 1.8rem; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.3s; 
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(124,58,237,0.4); }
        .btn-secondary { background: rgba(124,58,237,0.1); color: var(--primary-light); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(124,58,237,0.2); }

        /* Impact Map Simulation */
        .impact-map {
            width: 100%;
            height: 400px;
            background: url('https://raw.githubusercontent.com/jarifovi/Unused-Medicine-Donation-System/main/assets/world-map-dark.svg') center/contain no-repeat;
            position: relative;
            margin: 4rem 0;
            opacity: 0.5;
            filter: hue-rotate(260deg);
        }
        .pulse {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(6,182,212,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(6,182,212,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(6,182,212,0); }
            100% { box-shadow: 0 0 0 0 rgba(6,182,212,0); }
        }

        /* Leaderboard Styling */
        .leaderboard-list { list-style: none; padding: 0; }
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: rgba(124,58,237,0.05);
            border-radius: 14px;
            border: 1px solid rgba(124,58,237,0.1);
            transition: background 0.3s;
        }
        .leaderboard-item:hover { background: rgba(124,58,237,0.1); }
        .rank-num { width: 30px; font-weight: 700; color: var(--accent); }
        .points { margin-left: auto; font-weight: 600; color: var(--accent); }

        /* Scanner Modal */
        .scanner-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6,5,15,0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .scan-frame {
            width: 280px;
            height: 280px;
            border: 2px solid var(--primary);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 15px var(--accent);
            top: 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(124,58,237,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); background: rgba(124,58,237,0.1); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }

        /* Blockchain Certificate UI */
        .blockchain-card {
            border: 1px solid rgba(6,182,212,0.3);
            background: rgba(6,182,212,0.05);
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }
        .blockchain-card::after {
            content: 'VERIFIED ON LEDGER';
            position: absolute;
            top: 5px; right: 5px;
            font-size: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Safety Guard Notification */
        .safety-guard {
            background: rgba(244,114,182,0.08);
            border: 1px solid rgba(244,114,182,0.3);
            color: var(--accent2);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .ticker-wrap {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
            padding: 0.5rem 0;
            overflow: hidden;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .ticker {
            display: flex;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Achievement Toast */
        .toast-milestone {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 1.2rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(124,58,237,0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 3000;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Climate Widget */
        .climate-widget {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .climate-info { display: flex; align-items: center; gap: 1rem; }
        .temp-val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }

        /* Floating AI Chatbot */
        .ai-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124,58,237,0.4);
            z-index: 2500;
            transition: all 0.3s;
        }
        .ai-fab:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 15px 40px rgba(124,58,237,0.5); }
        .chat-box {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            width: 350px;
            height: 450px;
            z-index: 2500;
            display: flex;
            flex-direction: column;
        }

        /* Voice Wave Animation */
        .voice-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
            justify-content: center;
            margin-top: 1rem;
        }
        .wave-bar {
            width: 4px;
            height: 10px;
            background: var(--accent);
            border-radius: 4px;
            animation: wave 1s infinite ease-in-out;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        .btn-mic {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-mic.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            box-shadow: 0 0 25px rgba(124,58,237,0.5);
        }

        /* Reward Marketplace Cards */
        .reward-card {
            background: rgba(124,58,237,0.05);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }
        .reward-card:hover { transform: translateY(-4px); border-color: rgba(124,58,237,0.3); }
        .reward-card .points-tag {
            position: absolute;
            top: 10px; right: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Neural Pulse Animation */
        .neural-pulse {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            margin: 0 auto;
            animation: neural-glow 2s infinite;
        }
        @keyframes neural-glow {
            0% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(0.8); opacity: 0.3; }
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div style="border: 4px solid var(--glass); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 15px; color: var(--text-dim);">Initializing MedDonate Pro...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            const [notifications, setNotifications] = useState([]);
            const [showChat, setShowChat] = useState(false);
            const [showMilestone, setShowMilestone] = useState(false);

            useEffect(() => {
                if (user) {
                    localStorage.setItem('user', JSON.stringify(user));
                    // Show milestone for demo
                    setTimeout(() => setShowMilestone(true), 3000);
                    setTimeout(() => setShowMilestone(false), 8000);
                } else {
                    localStorage.removeItem('user');
                }
            }, [user]);

            const Navbar = () => (
                <header className="navbar">
                    <div className="container" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <a onClick={() => setPage('home')} className="logo" style={{cursor:'pointer'}}>
                            <i className="fas fa-microchip"></i> MedDonate PRO
                        </a>
                        
                        <div className="search-bar">
                            <i className="fas fa-search" style={{opacity:0.5}}></i>
                            <input type="text" placeholder="Voice Search (V)..." style={{background:'none', border:'none', color:'white', outline:'none', width:'100%'}} />
                            <i className="fas fa-microphone" style={{color:'var(--accent)', cursor:'pointer'}}></i>
                        </div>

                        <nav>
                            <ul style={{display:'flex', gap:'2rem', alignItems:'center', listStyle:'none', margin:0}}>
                                <li><a onClick={() => setPage('home')} style={{cursor:'pointer', textDecoration:'none', color:page==='home'?'var(--accent)':'white'}}>Home</a></li>
                                {user ? (
                                    <>
                                        <li><a onClick={() => setPage('dashboard')} style={{cursor:'pointer', textDecoration:'none', color:page==='dashboard'?'var(--accent)':'white'}}>Dashboard</a></li>
                                        <li><button onClick={() => {setUser(null); setPage('home');}} className="btn btn-secondary" style={{padding:'0.5rem 1rem'}}>Logout</button></li>
                                    </>
                                ) : (
                                    <>
                                        <li><a onClick={() => setPage('login')} style={{cursor:'pointer', textDecoration:'none', color:'white'}}>Sign In</a></li>
                                        <li><button onClick={() => setPage('register')} className="btn btn-primary">Join Ecosystem</button></li>
                                    </>
                                )}
                            </ul>
                        </nav>
                    </div>
                </header>
            );

            const Home = () => {
                const [stats, setStats] = useState({ total: 1240, users: 450, categories: [] });
                const [leaderboard, setLeaderboard] = useState({ donors: [], ngos: [] });

                useEffect(() => {
                    fetch('api/medicines.php?action=stats').then(r=>r.json()).then(d => d.success && setStats(d.stats));
                    fetch('api/medicines.php?action=leaderboard').then(r=>r.json()).then(d => d.success && setLeaderboard(d));
                }, []);

                return (
                    <div>
                        <div className="ticker-wrap">
                            <div className="ticker">
                                <span><i className="fas fa-heart"></i> NEW DONATION: 20x Paracetamol from Dhaka</span>
                                <span style={{marginLeft:'3rem'}}><i className="fas fa-check-circle"></i> NGO VERIFIED: Helping Hands Foundation</span>
                                <span style={{marginLeft:'3rem'}}><i className="fas fa-bolt"></i> URGENT NEED: Insulin at City Medical Center</span>
                            </div>
                        </div>

                        <div className="container" style={{padding:'5rem 0', textAlign:'center'}}>
                            <h1 style={{fontSize:'4.5rem', fontWeight:'800', lineHeight:'1.1', background:'linear-gradient(135deg, #f0eeff, var(--primary-light), var(--accent))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>
                                Intelligent Medicine <br/>Redistribution Network.
                            </h1>
                            <p style={{fontSize:'1.3rem', color: 'var(--text-dim)', maxWidth:'750px', margin:'1.5rem auto'}}>
                                We use decentralized tracking and AI logistics to ensure zero-waste medicine cycles across the globe.
                            </p>
                            
                            <div style={{display:'flex', gap:'1.5rem', justifyContent:'center', marginTop:'3rem'}}>
                                <button onClick={() => setPage('register')} className="btn btn-primary" style={{padding:'1.2rem 2.5rem', fontSize:'1.1rem'}}>Start Donating</button>
                                <button className="btn btn-secondary" style={{padding:'1.2rem 2.5rem', fontSize:'1.1rem'}}>Learn More</button>
                            </div>

                            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))', gap:'2rem', marginTop:'6rem'}}>
                                <div className="glass-card">
                                    <i className="fas fa-capsules" style={{fontSize:'2.5rem', color: 'var(--primary-light)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.5rem', margin:'0'}}>{stats.total}</h3>
                                    <p style={{color: 'var(--text-dim)'}}>Units Donated</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-leaf" style={{fontSize:'2.5rem', color: 'var(--accent)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.5rem', margin:'0'}}>{(stats.total * 0.45).toFixed(1)}kg</h3>
                                    <p style={{color: 'var(--text-dim)'}}>CO2 Offset</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-users" style={{fontSize:'2.5rem', color: 'var(--primary-light)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.5rem', margin:'0'}}>{stats.users}</h3>
                                    <p style={{color: 'var(--text-dim)'}}>Active Guardians</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-hand-holding-heart" style={{fontSize:'2.5rem', color: 'var(--accent2)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.5rem', margin:'0'}}>{stats.total * 6}</h3>
                                    <p style={{color: 'var(--text-dim)'}}>Lives Touched</p>
                                </div>
                            </div>

                            <div style={{marginTop:'8rem', textAlign:'left'}}>
                                <h2 style={{fontSize:'2.5rem', marginBottom:'3rem', textAlign:'center'}}>Global Live Impact</h2>
                                <div className="impact-map">
                                    <div className="pulse" style={{top:'30%', left:'45%'}}></div>
                                    <div className="pulse" style={{top:'50%', left:'70%'}}></div>
                                    <div className="pulse" style={{top:'65%', left:'25%'}}></div>
                                    <div className="pulse" style={{top:'40%', left:'80%'}}></div>
                                    <div className="pulse" style={{top:'55%', left:'15%'}}></div>
                                </div>
                            </div>

                            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(350px, 1fr))', gap:'3rem', marginTop:'6rem', textAlign:'left'}}>
                                <div className="glass-card">
                                    <h3 style={{display:'flex', alignItems:'center', gap:'0.8rem'}}>
                                        <i className="fas fa-trophy" style={{color:'var(--accent)'}}></i> Top Donors
                                    </h3>
                                    <ul className="leaderboard-list">
                                        {(leaderboard.donors.length > 0 ? leaderboard.donors : [
                                            {name: "Alexander Pierce", donations_made: 42},
                                            {name: "Sarah Jenkins", donations_made: 38},
                                            {name: "Michael Chen", donations_made: 25}
                                        ]).map((d, i) => (
                                            <li key={i} className="leaderboard-item">
                                                <span className="rank-num">#{i+1}</span>
                                                <span>{d.name}</span>
                                                <span className="points">{d.donations_made} Units</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="glass-card">
                                    <h3 style={{display:'flex', alignItems:'center', gap:'0.8rem'}}>
                                        <i className="fas fa-hospital" style={{color: 'var(--accent)'}}></i> Top Receiving NGOs
                                    </h3>
                                    <ul className="leaderboard-list">
                                        {(leaderboard.ngos.length > 0 ? leaderboard.ngos : [
                                            {name: "Global Health Aid", requests_completed: 156},
                                            {name: "Red Cross Intl", requests_completed: 142},
                                            {name: "Community Care", requests_completed: 98}
                                        ]).map((n, i) => (
                                            <li key={i} className="leaderboard-item">
                                                <span className="rank-num">#{i+1}</span>
                                                <span>{n.name}</span>
                                                <span className="points">{n.requests_completed} Served</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const Dashboard = () => {
                const [view, setView] = useState('inventory');
                const [medicines, setMedicines] = useState([]);
                const [showScanner, setShowScanner] = useState(false);

                useEffect(() => { if(view==='inventory') fetchInventory(); }, [view]);

                const fetchInventory = async () => {
                    const res = await fetch('api/medicines.php?action=list');
                    const data = await res.json();
                    if (data.success) setMedicines(data.medicines);
                };

                return (
                    <div className="container" style={{padding:'3rem 0'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'3rem'}}>
                            <div>
                                <h1 style={{fontSize:'2.5rem', margin:0}}>Commander Center</h1>
                                <p style={{color: 'var(--text-dim)'}}>Logged in as {user.name} ({user.type})</p>
                            </div>
                            <div style={{display:'flex', gap:'1rem'}}>
                                <button onClick={()=>setView('inventory')} className={`btn ${view==='inventory'?'btn-primary':'btn-secondary'}`}>Inventory</button>
                                {user.type === 'Individual' && <button onClick={()=>setView('donate')} className={`btn ${view==='donate'?'btn-primary':'btn-secondary'}`}>Donate Now</button>}
                                {user.type === 'Volunteer' && <button onClick={()=>setView('radar')} className={`btn ${view==='radar'?'btn-primary':'btn-secondary'}`}>Active Missions</button>}
                                {user.type === 'NGO' && <button onClick={()=>setView('vault')} className={`btn ${view==='vault'?'btn-primary':'btn-secondary'}`}>Verification Vault</button>}
                                {user.type === 'Individual' && <button onClick={()=>setView('rewards')} className={`btn ${view==='rewards'?'btn-primary':'btn-secondary'}`}><i className="fas fa-trophy"></i> Rewards</button>}
                                <button onClick={()=>setView('vmed')} className={`btn ${view==='vmed'?'btn-primary':'btn-secondary'}`}><i className="fas fa-brain"></i> V-Med AI</button>
                                {user.type === 'Admin' && <button onClick={()=>setView('admin')} className={`btn ${view==='admin'?'btn-primary':'btn-secondary'}`}>Admin Terminal</button>}
                            </div>
                        </div>

                        {view === 'vmed' && (
                            <div className="glass-card" style={{maxWidth:'700px', margin:'0 auto', textAlign:'center'}}>
                                <div className="neural-pulse"></div>
                                <h2 style={{marginTop:'1rem'}}>V-Med Neural Assistant</h2>
                                <p style={{color:'var(--text-dim)'}}>Enter symptoms for a non-diagnostic medicine matching analysis.</p>
                                
                                <div className="form-group" style={{marginTop:'2rem'}}>
                                    <textarea className="form-control" rows="3" placeholder="Describe symptoms (e.g., Fever, headache, muscle pain)..." style={{textAlign:'center'}}></textarea>
                                </div>
                                <button className="btn btn-primary" style={{width:'100%'}}>Analyze & Match Inventory</button>

                                <div style={{marginTop:'2rem', padding:'1rem', background:'rgba(244,114,182,0.08)', border:'1px solid rgba(244,114,182,0.3)', borderRadius:'12px', fontSize:'0.75rem', color:'var(--accent2)'}}>
                                    <i className="fas fa-exclamation-triangle"></i> <strong>DISCLAIMER:</strong> V-Med AI is NOT a doctor. Results are for informational purposes only. Always consult a healthcare professional before taking any medicine.
                                </div>
                            </div>
                        )}

                        {view === 'rewards' && (
                            <div className="container">
                                <div className="glass-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2rem', background:'linear-gradient(90deg, rgba(124,58,237,0.1), transparent)'}}>
                                    <div>
                                        <h2 style={{margin:0}}>V-Points Marketplace</h2>
                                        <p style={{color:'var(--text-dim)'}}>Redeem your donation points for life-saving rewards.</p>
                                    </div>
                                    <div style={{textAlign:'right'}}>
                                        <span style={{fontSize:'0.8rem', color:'var(--text-dim)'}}>Current Balance</span>
                                        <div style={{fontSize:'2.5rem', fontWeight:'800', color:'var(--accent)'}}>1,250 VP</div>
                                    </div>
                                </div>
                                <div className="cards-grid">
                                    <div className="reward-card">
                                        <span className="points-tag">500 VP</span>
                                        <i className="fas fa-stethoscope" style={{fontSize:'2.5rem', color:'var(--accent)', marginBottom:'1rem'}}></i>
                                        <h4>Full Health Checkup</h4>
                                        <p style={{fontSize:'0.8rem', color:'var(--text-dim)'}}>Valid at City Medical Center</p>
                                        <button className="btn btn-primary" style={{width:'100%', marginTop:'1rem'}}>Claim Voucher</button>
                                    </div>
                                    <div className="reward-card">
                                        <span className="points-tag">200 VP</span>
                                        <i className="fas fa-pills" style={{fontSize:'2.5rem', color:'var(--accent)', marginBottom:'1rem'}}></i>
                                        <h4>Pharmacy Discount</h4>
                                        <p style={{fontSize:'0.8rem', color:'var(--text-dim)'}}>20% Off at Global Pharma</p>
                                        <button className="btn btn-primary" style={{width:'100%', marginTop:'1rem'}}>Claim Voucher</button>
                                    </div>
                                    <div className="reward-card">
                                        <span className="points-tag">1000 VP</span>
                                        <i className="fas fa-tree" style={{fontSize:'2.5rem', color:'var(--accent)', marginBottom:'1rem'}}></i>
                                        <h4>Carbon Offset Cert.</h4>
                                        <p style={{fontSize:'0.8rem', color:'var(--text-dim)'}}>Official ESG Impact Certificate</p>
                                        <button className="btn btn-primary" style={{width:'100%', marginTop:'1rem'}}>Generate Cert</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'vault' && (
                            <div className="glass-card" style={{maxWidth:'600px', margin:'0 auto'}}>
                                <h2>Verification Vault</h2>
                                <p style={{color:'var(--text-dim)'}}>Upload your government NGO license or tax-exemption certificate to receive the "Verified" badge.</p>
                                <div style={{border:'2px dashed var(--glass-border)', padding:'3rem', borderRadius:'20px', textAlign:'center', marginTop:'2rem'}}>
                                    <i className="fas fa-cloud-upload-alt" style={{fontSize:'3rem', marginBottom:'1rem', opacity:0.5}}></i>
                                    <p>Drag and drop PDF or JPG here</p>
                                    <button className="btn btn-secondary">Select File</button>
                                </div>
                                <button className="btn btn-primary" style={{width:'100%', marginTop:'2rem'}}>Submit for Review</button>
                            </div>
                        )}

                        <div className="climate-widget">
                            <div className="climate-info">
                                <i className="fas fa-temperature-high" style={{fontSize:'2rem', color:'var(--accent)'}}></i>
                                <div>
                                    <h4 style={{margin:0}}>Storage Climate</h4>
                                    <p style={{margin:0, fontSize:'0.8rem', opacity:0.6}}>Optimal for Insulin Storage</p>
                                </div>
                            </div>
                            <div className="temp-val">24°C <span style={{fontSize:'1rem', opacity:0.5}}>| 65% RH</span></div>
                        </div>

                        {user.type === 'NGO' && (
                            <div className="safety-guard">
                                <i className="fas fa-shield-virus" style={{fontSize:'1.5rem'}}></i>
                                <div>
                                    <h4 style={{margin:0}}>AI Safety Guard Active</h4>
                                    <p style={{margin:0, fontSize:'0.8rem', opacity:0.8}}>Analyzing drug interactions in real-time based on your current inventory.</p>
                                </div>
                            </div>
                        )}

                        {view === 'radar' && (
                            <div className="glass-card" style={{textAlign:'center', padding:'4rem'}}>
                                <i className="fas fa-satellite-dish" style={{fontSize:'4rem', color:'var(--accent)', marginBottom:'2rem'}}></i>
                                <h2>Scanning for Deliveries...</h2>
                                <p style={{color:'var(--text-dim)'}}>3 Pending pick-ups found within 5km of your location.</p>
                                <button className="btn btn-primary" style={{marginTop:'2rem'}}>Engage Navigation</button>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="cards-grid">
                                {medicines.map(m => (
                                    <div key={m.id} className="glass-card">
                                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.5rem'}}>
                                            <span style={{background: 'var(--accent)', color:'#000', padding:'0.3rem 0.8rem', borderRadius:'8px', fontSize:'0.75rem', fontWeight:'800'}}>{m.category.toUpperCase()}</span>
                                            {m.donor_verified && <i className="fas fa-check-circle" style={{color: 'var(--accent)'}} title="Verified Donor"></i>}
                                        </div>
                                        <h3 style={{margin:'0 0 0.5rem 0'}}>{m.name}</h3>
                                        <p style={{fontSize:'0.9rem', color: 'var(--text-dim)', height:'50px', overflow:'hidden'}}>{m.description}</p>
                                        <div style={{marginTop:'1.5rem', padding:'1rem', background:'rgba(255,255,255,0.03)', borderRadius:'12px', fontSize:'0.85rem'}}>
                                            <div style={{display:'flex', justifyContent:'space-between', marginBottom:'0.5rem'}}>
                                                <span style={{color: 'var(--text-dim)'}}>Expires</span>
                                                <span style={{color: new Date(m.expiry_date) < new Date() ? '#ef4444' : '#fff'}}>{m.expiry_date}</span>
                                            </div>
                                            <div style={{display:'flex', justifyContent:'space-between'}}>
                                                <span style={{color: 'var(--text-dim)'}}>Provider</span>
                                                <span>{m.donor_name}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="blockchain-card">
                                            HASH: {Math.random().toString(16).substring(2, 15).toUpperCase()}...<br/>
                                            BLOCK: #829{m.id} | NODE: DX-04
                                        </div>

                                        {m.status === 'Approved' && (
                                            <div style={{marginTop:'1rem', textAlign:'center', padding:'1rem', background:'rgba(0,200,83,0.1)', borderRadius:'12px', border:'1px dashed var(--accent)'}}>
                                                <i className="fas fa-qrcode" style={{fontSize:'2rem', marginBottom:'0.5rem'}}></i>
                                                <p style={{fontSize:'0.75rem', margin:0}}>Secure Handover Code Available</p>
                                            </div>
                                        )}
                                        {user.type === 'NGO' && m.status === 'Available' && <button onClick={async () => {
                                            const res = await fetch('api/medicines.php?action=request', {method:'POST', body:JSON.stringify({medicine_id: m.id})});
                                            const d = await res.json();
                                            if(d.success) { alert('Request Dispatched!'); fetchInventory(); }
                                        }} className="btn btn-primary" style={{width:'100%', marginTop:'1.5rem'}}>Intercept Batch</button>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'donate' && (
                            <div className="glass-card" style={{maxWidth:'600px', margin:'0 auto'}}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2rem'}}>
                                    <h2 style={{margin:0}}>Contribution Form</h2>
                                    <button onClick={()=>setShowScanner(true)} className="btn btn-secondary" style={{fontSize:'0.85rem'}}>
                                        <i className="fas fa-camera"></i> AI Scan
                                    </button>
                                </div>
                                <DonateForm onComplete={() => setView('inventory')} />
                            </div>
                        )}

                        {showScanner && (
                            <div className="scanner-overlay">
                                <h2 style={{marginBottom:'2rem', letterSpacing:'2px'}}>NEURAL SCAN IN PROGRESS</h2>
                                <div className="scan-frame">
                                    <div className="scan-line"></div>
                                    <div style={{width:'100%', height:'100%', background:'url(https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=400&auto=format&fit=crop&q=60) center/cover', filter:'grayscale(100%) contrast(150%)'}}></div>
                                </div>
                                <div style={{marginTop:'2rem', color: 'var(--accent)', fontFamily:'monospace', fontSize:'0.9rem'}}>
                                    [ SCANNING LAYERS... ]<br/>
                                    [ MATCHING DATABASE... ]
                                </div>
                                <button onClick={() => {
                                    // Mock recognition
                                    setTimeout(() => {
                                        window.lastScanned = { name: 'Augmentin 625mg Duo', category: 'Tablet', description: 'Amoxicillin and Potassium Clavulanate Tablets (IP 625mg). Professional batch identification successful.', expiry: '2026-12-30' };
                                        setShowScanner(false);
                                        alert('AI Verification Success: Augmentin 625mg identified with 98.4% confidence.');
                                    }, 1500);
                                }} className="btn btn-primary" style={{marginTop:'2rem'}}>Initialize Capture</button>
                                <button onClick={()=>setShowScanner(false)} className="btn btn-secondary" style={{marginTop:'1rem'}}>Cancel Sequence</button>
                            </div>
                        )}
                    </div>
                );
            };

            const DonateForm = ({ onComplete }) => {
                const [form, setForm] = useState({ name:'', category:'Tablet', description:'', expiry_date:'', quantity:1 });
                const [isListening, setIsListening] = useState(false);
                
                useEffect(() => {
                    if(window.lastScanned) {
                        setForm({
                            name: window.lastScanned.name,
                            category: window.lastScanned.category,
                            description: window.lastScanned.description,
                            expiry_date: window.lastScanned.expiry,
                            quantity: 1
                        });
                        window.lastScanned = null;
                    }
                }, []);

                const startVoice = () => {
                    setIsListening(true);
                    // Mock Voice Recognition
                    setTimeout(() => {
                        setForm({
                            ...form,
                            name: 'Paracetamol 500mg',
                            description: '2 Strips of 10 tablets each. Donating via voice command.',
                            expiry_date: '2026-08-25'
                        });
                        setIsListening(false);
                        alert('Voice Recognition Success: "Paracetamol 500mg" added.');
                    }, 3000);
                };

                const submit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/medicines.php?action=donate', {method:'POST', body:JSON.stringify(form)});
                    const d = await res.json();
                    if(d.success) onComplete();
                };

                return (
                    <form onSubmit={submit}>
                        <div style={{display:'flex', gap:'1rem', alignItems:'center', marginBottom:'1.5rem'}}>
                            <div style={{flex:1}}>
                                <label style={{display:'block', fontSize:'0.8rem', color:'var(--text-dim)', marginBottom:'0.5rem'}}>Generic/Brand Name</label>
                                <input type="text" className="form-control" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="e.g. Panadol 500mg" required />
                            </div>
                            <button type="button" onClick={startVoice} className={`btn-mic ${isListening?'active':''}`} title="Voice Command">
                                <i className="fas fa-microphone"></i>
                            </button>
                        </div>

                        {isListening && (
                            <div className="voice-wave">
                                <div className="wave-bar"></div>
                                <div className="wave-bar"></div>
                                <div className="wave-bar"></div>
                                <div className="wave-bar"></div>
                                <div className="wave-bar"></div>
                            </div>
                        )}
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem'}}>
                            <div className="form-group">
                                <label>Formulation</label>
                                <select className="form-control" value={form.category} onChange={e=>setForm({...form, category:e.target.value})}>
                                    <option>Tablet</option>
                                    <option>Syrup</option>
                                    <option>Injection</option>
                                    <option>Cream/Ointment</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Expiration Date</label>
                                <input type="date" className="form-control" value={form.expiry_date} onChange={e=>setForm({...form, expiry_date:e.target.value})} required />
                            </div>
                        </div>
                        <div className="form-group">
                            <label>Composition/Dosage Details</label>
                            <textarea className="form-control" value={form.description} onChange={e=>setForm({...form, description:e.target.value})} required rows="4" placeholder="Mention strength, storage conditions..." />
                        </div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%', padding:'1.2rem'}}>Initialize Batch Transfer</button>
                    </form>
                );
            };

            const Login = () => {
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const submit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/auth.php?action=login', {method:'POST', body:JSON.stringify({email, password})});
                    const d = await res.json();
                    if(d.success) { setUser(d.user); setPage('dashboard'); }
                    else alert(d.message);
                };
                return (
                    <div className="container" style={{padding:'8rem 0'}}>
                        <div className="glass-card" style={{maxWidth:'450px', margin:'0 auto'}}>
                            <h2 style={{fontSize:'2rem', marginBottom:'0.5rem'}}>Welcome Back</h2>
                            <p style={{color: 'var(--text-dim)', marginBottom:'2.5rem'}}>Reconnect to the MedLink ecosystem.</p>
                            <form onSubmit={submit}>
                                <div className="form-group"><label>Quantum Email</label><input type="email" className="form-control" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                                <div className="form-group"><label>Security Pass</label><input type="password" className="form-control" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                                <button type="submit" className="btn btn-primary" style={{width:'100%', marginTop:'1rem', padding:'1.2rem'}}>Authenticate</button>
                            </form>
                            <p style={{textAlign:'center', marginTop:'2rem', color: 'var(--text-dim)'}}>
                                New guardian? <a onClick={()=>setPage('register')} style={{color: 'var(--accent)', cursor:'pointer', fontWeight:'600'}}>Create Identity</a>
                            </p>
                        </div>
                    </div>
                );
            };

            const Register = () => {
                const [form, setForm] = useState({ name:'', email:'', password:'', type:'Individual', phone:'', address:'' });
                const submit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/auth.php?action=register', {method:'POST', body:JSON.stringify(form)});
                    const d = await res.json();
                    if(d.success) setPage('login');
                    else alert(d.message);
                };
                return (
                    <div className="container" style={{padding:'5rem 0'}}>
                        <div className="glass-card" style={{maxWidth:'550px', margin:'0 auto'}}>
                            <h2 style={{fontSize:'2.2rem', marginBottom:'0.5rem'}}>Join the Ecosystem</h2>
                            <p style={{color: 'var(--text-dim)', marginBottom:'2.5rem'}}>Help us bridge the gap in global healthcare.</p>
                            <form onSubmit={submit}>
                                <div className="form-group"><label>Full Legal Name</label><input type="text" className="form-control" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required /></div>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem'}}>
                                    <div className="form-group"><label>Email</label><input type="email" className="form-control" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} required /></div>
                                    <div className="form-group"><label>Phone</label><input type="text" className="form-control" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} required /></div>
                                </div>
                                <div className="form-group"><label>Account Designation</label>
                                    <select className="form-control" value={form.type} onChange={e=>setForm({...form, type:e.target.value})}>
                                        <option value="Individual">Individual Donor</option>
                                        <option value="NGO">Registered NGO</option>
                                        <option value="Volunteer">Volunteer Runner</option>
                                    </select>
                                </div>
                                <div className="form-group"><label>Access Password</label><input type="password" className="form-control" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} required /></div>
                                <div className="form-group"><label>Operational Address</label><textarea className="form-control" value={form.address} onChange={e=>setForm({...form, address:e.target.value})} required rows="2" /></div>
                                <button type="submit" className="btn btn-primary" style={{width:'100%', marginTop:'1rem', padding:'1.2rem'}}>Initialize Account</button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="app">
                    <Navbar />
                    <main style={{minHeight:'80vh'}}>
                        {page === 'home' && <Home />}
                        {page === 'login' && <Login />}
                        {page === 'register' && <Register />}
                        {page === 'dashboard' && <Dashboard />}
                    </main>
                    
                    <div className="ai-fab" onClick={() => setShowChat(!showChat)}>
                        <i className={`fas ${showChat ? 'fa-times' : 'fa-robot'}`}></i>
                    </div>

                    {showChat && (
                        <div className="chat-box glass-card">
                            <div style={{borderBottom:'1px solid var(--glass-border)', paddingBottom:'1rem', marginBottom:'1rem'}}>
                                <h4 style={{margin:0}}>Quantum Assistant</h4>
                                <span style={{fontSize:'0.7rem', color:'var(--accent)'}}>● Online | Neural Model v4.2</span>
                            </div>
                            <div style={{flex:1, overflowY:'auto', fontSize:'0.9rem'}}>
                                <div style={{background:'rgba(255,255,255,0.05)', padding:'0.8rem', borderRadius:'12px', marginBottom:'1rem'}}>
                                    Hello {user ? user.name : 'Guardian'}! How can I help you save lives today?
                                </div>
                                <div style={{background:'var(--accent)', color:'#000', padding:'0.8rem', borderRadius:'12px', marginBottom:'1rem', marginLeft:'2rem'}}>
                                    Can I donate opened medicine?
                                </div>
                                <div style={{background:'rgba(255,255,255,0.05)', padding:'0.8rem', borderRadius:'12px'}}>
                                    We only accept sealed strips or bottles for safety. Please ensure the expiry date is at least 3 months away.
                                </div>
                            </div>
                            <input type="text" className="form-control" placeholder="Ask anything..." style={{marginTop:'1rem'}} />
                        </div>
                    )}

                    {showMilestone && (
                        <div className="toast-milestone">
                            <i className="fas fa-award" style={{fontSize:'1.5rem'}}></i>
                            <div>
                                <div style={{fontSize:'0.7rem', opacity:0.8}}>MILESTONE UNLOCKED</div>
                                <div>Life Saver Level 1</div>
                            </div>
                        </div>
                    )}

                    <footer style={{padding:'4rem 0', borderTop: '1px solid var(--glass-border)', marginTop:'5rem', textAlign:'center'}}>
                        <div className="container">
                            <a className="logo" style={{justifyContent:'center', marginBottom:'1.5rem'}}>
                                <i className="fas fa-microchip"></i> MedDonate PRO
                            </a>
                            <p style={{color: 'var(--text-dim)', fontSize:'0.9rem'}}>© 2026 MedLink Systems. Engineering a waste-free medical future.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
