<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unused Medicine Donation System - Global Redistribution Network</title>
    <style>@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap");</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #ffb300; 
            --primary-light: #ffd54f;
            --accent: #ffca28;
            --accent2: #ff7043;
            --bg: #0a0a0a; 
            --glass: rgba(255, 179, 0, 0.03);
            --glass-border: rgba(255, 179, 0, 0.12);
            --text-main: #ffffff;
            --text-dim: #a1a1a1;
        }

        * { box-sizing: border-box; }

        body { 
            --font-main: "Outfit", sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(ellipse at 10% 0%, rgba(255,179,0,0.12) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 100%, rgba(255,112,67,0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(10,10,10,1) 0%, transparent 100%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .glass-card { 
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,179,0,0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }
        .glass-card:hover::before { left: 100%; }
        .glass-card:hover {
            transform: translateY(-6px);
            background: rgba(20, 20, 20, 0.8);
            border-color: rgba(255, 179, 0, 0.3);
            box-shadow: 0 25px 50px -12px rgba(255, 179, 0, 0.15);
        }

        .climate-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            z-index: 100;
            box-shadow: 0 0 30px rgba(255,179,0,0.1);
            transition: 0.3s;
        }
        .climate-widget:hover { border-color: var(--primary); transform: translateY(-5px); }

        .temp-val {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            font-family: 'monospace';
        }

        .ai-fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 65px; height: 65px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,179,0,0.4);
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ai-fab:hover { transform: scale(1.15) rotate(15deg); }
        .ai-waves {
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .navbar { 
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            padding: 1.2rem 0; 
            border-bottom: 1px solid var(--glass-border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 0.6rem; 
            text-transform: uppercase;
        }

        .btn { 
            padding: 0.8rem 1.8rem; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.3s; 
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: transparent; color: var(--primary); border: 1px solid var(--glass-border); }

        .impact-map {
            width: 100%;
            height: 400px;
            background: url('https://raw.githubusercontent.com/jarifovi/Unused-Medicine-Donation-System/main/assets/world-map-dark.svg') center/contain no-repeat;
            position: relative;
            margin: 4rem 0;
            opacity: 0.4;
            filter: grayscale(1) brightness(1.5) sepia(1) hue-rotate(-20deg) saturate(3);
        }
        .pulse {
            position: absolute;
            width: 12px; height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 179, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); }
        }

        .impact-ticker {
            background: rgba(255,179,0,0.05);
            border-top: 1px solid var(--glass-border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }
        .ticker-content { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }

        .blockchain-card {
            border: 1px solid rgba(255, 179, 0, 0.2);
            background: rgba(255, 179, 0, 0.03);
            padding: 1.2rem;
            border-radius: 8px;
            font-family: 'monospace';
            font-size: 0.75rem;
            color: var(--primary-light);
            margin-top: 1.2rem;
            position: relative;
        }
        .blockchain-card::after {
            content: 'AUTHENTICATED';
            position: absolute;
            top: 6px; right: 6px;
            font-size: 0.55rem;
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: 900;
        }

        .scanner-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,5,0.98);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .scan-frame {
            width: 300px; height: 300px;
            border: 1px solid var(--primary);
            position: relative;
            overflow: hidden;
        }
        .scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }

        .toast-milestone {
            position: fixed;
            bottom: 120px;
            left: 30px;
            background: var(--primary);
            color: #000;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 2000;
            animation: slideUp 0.5s ease-out;
            font-weight: 800;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }
        .btn-mic {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,179,0,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
        }
        .btn-mic.active { background: var(--primary); color: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            const [showMilestone, setShowMilestone] = useState(false);
            const [showMapModal, setShowMapModal] = useState(null);

            useEffect(() => {
                if (user) {
                    localStorage.setItem('user', JSON.stringify(user));
                    setTimeout(() => setShowMilestone(true), 3000);
                    setTimeout(() => setShowMilestone(false), 8000);
                } else {
                    localStorage.removeItem('user');
                }
            }, [user]);

            const Navbar = () => (
                <header className="navbar">
                    <div className="container" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <a onClick={() => setPage('home')} className="logo" style={{cursor:'pointer'}}>
                            <i className="fas fa-hand-holding-medical"></i> Unused Medicine Donation System
                        </a>
                        <div className="nav-links" style={{display:'flex', gap:'2rem', alignItems:'center'}}>
                            <a onClick={() => setPage('home')} style={{cursor:'pointer', color: page==='home'?'var(--primary)':'#fff', textDecoration:'none', fontSize:'0.8rem', fontWeight:'700'}}>NETWORK</a>
                            {user ? (
                                <>
                                    <a onClick={() => setPage('dashboard')} style={{cursor:'pointer', color: page==='dashboard'?'var(--primary)':'#fff', textDecoration:'none', fontSize:'0.8rem', fontWeight:'700'}}>COMMAND</a>
                                    <button onClick={() => {setUser(null); setPage('home');}} className="btn btn-secondary" style={{padding:'0.5rem 1.2rem', fontSize:'0.75rem'}}>LOGOUT</button>
                                </>
                            ) : (
                                <>
                                    <a onClick={() => setPage('login')} style={{cursor:'pointer', color: page==='login'?'var(--primary)':'#fff', textDecoration:'none', fontSize:'0.8rem', fontWeight:'700'}}>SIGN IN</a>
                                    <button onClick={() => setPage('register')} className="btn btn-primary" style={{padding:'0.6rem 1.5rem', fontSize:'0.75rem'}}>JOIN NETWORK</button>
                                </>
                            )}
                        </div>
                    </div>
                    <div className="impact-ticker">
                        <div className="ticker-content">
                            • GLOBAL IMPACT: 45,000+ LIVES SECURED • NEURAL SYNC ACTIVE • BLOCKCHAIN VERIFICATION: 100% • RECENT DONATION: INSULIN (DHAKA) • RECENT DONATION: AMOXICILLIN (LONDON) • 
                        </div>
                    </div>
                </header>
            );

            const Home = () => (
                <div className="container" style={{padding:'6rem 0', textAlign:'center'}}>
                    <h1 style={{fontSize:'4.5rem', fontWeight:'900', letterSpacing:'-2px', textTransform:'uppercase', background:'linear-gradient(to right, #fff, var(--primary))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>
                        Unused Medicine<br/>Redistribution.
                    </h1>
                    <p style={{fontSize:'1.3rem', color:'var(--text-dim)', maxWidth:'800px', margin:'2rem auto'}}>
                        Elite medical logistics powered by blockchain and AI. Bridging the gap between waste and life.
                    </p>
                    <div style={{display:'flex', gap:'1.5rem', justifyContent:'center', marginTop:'3rem'}}>
                        <button onClick={() => setPage('register')} className="btn btn-primary" style={{padding:'1.2rem 3rem'}}>Join Ecosystem</button>
                        <button onClick={() => setPage(user ? 'dashboard' : 'login')} className="btn btn-secondary" style={{padding:'1.2rem 3rem'}}>View Network</button>
                    </div>
                    <div className="impact-map">
                        <div className="pulse" style={{top:'30%', left:'45%'}}></div>
                        <div className="pulse" style={{top:'60%', left:'30%'}}></div>
                        <div className="pulse" style={{top:'45%', left:'75%'}}></div>
                    </div>
                </div>
            );

            const Dashboard = () => {
                const [view, setView] = useState('inventory');
                const [medicines, setMedicines] = useState([
                    {id: 1, name: 'Amoxicillin 500mg', category: 'Tablet', description: 'Broad-spectrum antibiotic.', expiry_date: '2026-10-15', donor_name: 'Dr. Smith', status: 'Available'},
                    {id: 2, name: 'Metformin 850mg', category: 'Tablet', description: 'Anti-diabetic medication.', expiry_date: '2025-12-01', donor_name: 'Sarah J.', status: 'Available'},
                    {id: 3, name: 'Insulin Glargine', category: 'Injection', description: 'Basal insulin for glucose control.', expiry_date: '2026-05-20', donor_name: 'City Clinic', status: 'Available'}
                ]);

                return (
                    <div className="container" style={{padding:'4rem 0'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'4rem'}}>
                            <div>
                                <h1 style={{fontSize:'2.5rem', margin:0}}>Command Center</h1>
                                <p style={{color:'var(--text-dim)'}}>Logged in as {user.name} ({user.type})</p>
                            </div>
                            <div style={{display:'flex', gap:'1rem'}}>
                                <button onClick={()=>setView('inventory')} className={`btn ${view==='inventory'?'btn-primary':'btn-secondary'}`}>Inventory</button>
                                <button onClick={()=>setView('analytics')} className={`btn ${view==='analytics'?'btn-primary':'btn-secondary'}`}>Analytics</button>
                                <button onClick={()=>setView('leaderboard')} className={`btn ${view==='leaderboard'?'btn-primary':'btn-secondary'}`}>Guardians</button>
                                {user.type === 'Admin' && <button onClick={()=>setView('admin')} className={`btn ${view==='admin'?'btn-primary':'btn-secondary'}`}>Admin Terminal</button>}
                                {user.type === 'Individual' && <button onClick={()=>setView('donate')} className="btn btn-primary">Donate Now</button>}
                            </div>
                        </div>

                        {view === 'inventory' && (
                            <div className="cards-grid">
                                {medicines.map(m => (
                                    <div key={m.id} className="glass-card">
                                        <div style={{display:'flex', justifyContent:'space-between', marginBottom:'1.5rem'}}>
                                            <span style={{background:'var(--primary)', color:'#000', padding:'0.3rem 0.8rem', borderRadius:'6px', fontSize:'0.7rem', fontWeight:'900'}}>{m.category.toUpperCase()}</span>
                                            <i className="fas fa-check-circle" style={{color:'var(--primary)'}}></i>
                                        </div>
                                        <h3 style={{margin:'0 0 0.5rem 0'}}>{m.name}</h3>
                                        <p style={{fontSize:'0.9rem', color:'var(--text-dim)', height:'50px'}}>{m.description}</p>
                                        <div className="blockchain-card">
                                            TRACE-ID: {Math.random().toString(16).substring(2, 10).toUpperCase()}<br/>
                                            STATUS: {m.status.toUpperCase()}
                                        </div>
                                        <div style={{display:'flex', gap:'0.5rem', marginTop:'1.5rem'}}>
                                            <button onClick={()=>setShowMapModal(m)} className="btn btn-secondary" style={{flex:1, fontSize:'0.7rem'}}>Lifecycle</button>
                                            <button className="btn btn-primary" style={{flex:2, fontSize:'0.7rem'}}>Secure Request</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'analytics' && (
                            <div className="glass-card" style={{padding:'3rem', textAlign:'center'}}>
                                <h2>Neural Analytics Feed</h2>
                                <p style={{color:'var(--text-dim)'}}>System-wide redistribution metrics synchronized.</p>
                                <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'2rem', marginTop:'3rem'}}>
                                    <div className="glass-card"><h4>98.4%</h4><p style={{fontSize:'0.7rem'}}>MATCH RATE</p></div>
                                    <div className="glass-card"><h4>2.4m</h4><p style={{fontSize:'0.7rem'}}>WASTE REDUCED</p></div>
                                    <div className="glass-card"><h4>14.2k</h4><p style={{fontSize:'0.7rem'}}>ACTIVE NODES</p></div>
                                </div>
                            </div>
                        )}

                        {view === 'leaderboard' && (
                            <div className="glass-card" style={{padding:'3rem'}}>
                                <h2 style={{textAlign:'center', marginBottom:'3rem'}}>Global Guardian Leaderboard</h2>
                                {[
                                    {rank:1, name:'MedAid Global', score:12500},
                                    {rank:2, name:'Hope Foundation', score:9800},
                                    {rank:3, name:'City Clinic', score:7400}
                                ].map(g => (
                                    <div key={g.rank} className="leaderboard-item">
                                        <span style={{fontWeight:'900', color:'var(--primary)'}}>#0{g.rank}</span>
                                        <span>{g.name}</span>
                                        <span style={{fontWeight:'700'}}>{g.score} VP</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'donate' && (
                            <div className="glass-card" style={{maxWidth:'600px', margin:'0 auto'}}>
                                <h2 style={{marginBottom:'2rem'}}>Donation Batch Form</h2>
                                <div className="form-group"><label>Medicine Name</label><input type="text" className="form-control" placeholder="e.g. Augmentin 625mg" /></div>
                                <div className="form-group"><label>Quantity</label><input type="number" className="form-control" defaultValue="1" /></div>
                                <div className="form-group"><label>Expiry Date</label><input type="date" className="form-control" /></div>
                                <button className="btn btn-primary" style={{width:'100%', padding:'1.2rem'}}>Initialize Batch</button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="glass-card">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'3rem'}}>
                                    <h2 style={{margin:0}}>System Oversight Terminal</h2>
                                    <span style={{color:'var(--accent)', fontSize:'0.7rem', border:'1px solid var(--accent)', padding:'4px 10px', borderRadius:'4px'}}>SECURE SESSION ACTIVE</span>
                                </div>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 2fr', gap:'2rem'}}>
                                    <div className="glass-card" style={{background:'rgba(255,255,255,0.02)'}}>
                                        <h4>User Verification Queue</h4>
                                        <div style={{marginTop:'1.5rem'}}>
                                            {[
                                                {name:'Hope Hospital', type:'NGO', status:'Pending'},
                                                {name:'John Doe', type:'Individual', status:'Flagged'},
                                                {name:'RespiCare Intl', type:'NGO', status:'Pending'}
                                            ].map((u, i) => (
                                                <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'1rem 0', borderBottom:'1px solid var(--glass-border)'}}>
                                                    <div><div style={{fontSize:'0.85rem'}}>{u.name}</div><div style={{fontSize:'0.65rem', color:'var(--text-dim)'}}>{u.type}</div></div>
                                                    <button className="btn btn-secondary" style={{fontSize:'0.6rem', padding:'0.4rem 0.8rem'}}>Verify</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass-card" style={{background:'rgba(255,255,255,0.02)'}}>
                                        <h4>Global Activity Log</h4>
                                        <div style={{marginTop:'1.5rem', fontFamily:'monospace', fontSize:'0.7rem', color:'var(--text-dim)', height:'200px', overflowY:'auto'}}>
                                            <div>[17:15:22] <span style={{color:'var(--primary)'}}>SYS</span>: Batch #42901 Verified via Node DX-04</div>
                                            <div>[17:16:01] <span style={{color:'var(--accent2)'}}>AUTH</span>: Failed login attempt from IP 192.168.1.45</div>
                                            <div>[17:16:10] <span style={{color:'var(--primary)'}}>SYS</span>: Inventory Sync Complete (14,204 records)</div>
                                            <div>[17:16:12] <span style={{color:'var(--accent)'}}>USER</span>: NGO 'Hope Foundation' uploaded tax license</div>
                                            <div>[17:16:15] <span style={{color:'var(--primary)'}}>SYS</span>: Neural model v4.2 calibration successful</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const Login = () => {
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const submit = (e) => {
                    e.preventDefault();
                    if(email === 'admin@meddonate.com' && password === 'admin') {
                        setUser({name:'Admin', email, type:'Admin'});
                        setPage('dashboard');
                    } else {
                        setUser({name:'Guest Guardian', email, type:'Individual'});
                        setPage('dashboard');
                    }
                };
                return (
                    <div className="container" style={{padding:'8rem 0'}}>
                        <div className="glass-card" style={{maxWidth:'450px', margin:'0 auto'}}>
                            <h2 style={{fontSize:'2rem', marginBottom:'2rem'}}>Access Terminal</h2>
                            <form onSubmit={submit}>
                                <div className="form-group"><label>Identity (Email)</label><input type="email" className="form-control" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                                <div className="form-group"><label>Access Key</label><input type="password" className="form-control" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                                <button type="submit" className="btn btn-primary" style={{width:'100%', marginTop:'1rem'}}>Initialize Session</button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="app">
                    <Navbar />
                    <main style={{minHeight:'80vh'}}>
                        {page === 'home' && <Home />}
                        {page === 'login' && <Login />}
                        {page === 'dashboard' && <Dashboard />}
                        {page === 'register' && <Login />}
                    </main>

                    {showMilestone && (
                        <div className="toast-milestone">
                            <i className="fas fa-award"></i>
                            <span>ACHIEVEMENT: Life Saver Level 1</span>
                        </div>
                    )}

                    <div className="climate-widget">
                        <i className="fas fa-temperature-low" style={{color:'var(--primary)'}}></i>
                        <span className="temp-val">18.4°C</span>
                        <div style={{width:'1px', height:'20px', background:'var(--glass-border)'}}></div>
                        <span style={{fontSize:'0.8rem', opacity:0.8}}>STORAGE STABLE</span>
                    </div>

                    <div className="ai-fab" onClick={() => {
                        const s = new SpeechSynthesisUtterance("V-Med AI Online. Standing by for donation batch data.");
                        window.speechSynthesis.speak(s);
                        alert("V-Med AI Activated. [LISTENING...]");
                    }}>
                        <div className="ai-waves"></div>
                        <i className="fas fa-robot"></i>
                    </div>

                    {showMapModal && (
                        <div className="scanner-overlay" onClick={()=>setShowMapModal(null)}>
                            <div className="glass-card" style={{maxWidth:'600px', width:'90%', height:'400px'}} onClick={e=>e.stopPropagation()}>
                                <h3>Lifecycle Trace: {showMapModal.name}</h3>
                                <div className="impact-map" style={{height:'250px', opacity:1, margin:'1rem 0'}}>
                                    <div className="pulse" style={{top:'40%', left:'30%'}}></div>
                                    <div className="pulse" style={{top:'55%', left:'45%'}}></div>
                                </div>
                                <p style={{fontSize:'0.8rem', opacity:0.6, textAlign:'center'}}>Geographical journey verified via blockchain nodes.</p>
                            </div>
                        </div>
                    )}

                    <footer style={{padding:'4rem 0', borderTop:'1px solid var(--glass-border)', textAlign:'center'}}>
                        <p style={{color:'var(--text-dim)', fontSize:'0.9rem'}}>© 2026 Unused Medicine Donation System. Global Redistribution Network.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
