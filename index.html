<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unused Medicine Donation System - Global Redistribution Network</title>
    <style>@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap");</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #ffb300; 
            --primary-light: #ffd54f;
            --accent: #ffca28;
            --accent2: #ff7043;
            --bg: #0a0a0a; 
            --glass: rgba(255, 179, 0, 0.03);
            --glass-border: rgba(255, 179, 0, 0.12);
            --text-main: #ffffff;
            --text-dim: #a1a1a1;
        }

        * { box-sizing: border-box; }

        body { 
            --font-main: "Outfit", sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 10% 0%, rgba(255,179,0,0.12) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 100%, rgba(255,112,67,0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(10,10,10,1) 0%, transparent 100%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .glass-card { 
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,179,0,0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            left: 100%;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            background: rgba(20, 20, 20, 0.8);
            border-color: rgba(255, 179, 0, 0.3);
            box-shadow: 0 25px 50px -12px rgba(255, 179, 0, 0.15);
        }

        .navbar { 
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            padding: 1.2rem 0; 
            border-bottom: 1px solid var(--glass-border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 0.6rem; 
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .search-bar {
            background: rgba(255,179,0,0.04);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            color: white;
            width: 280px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .search-bar:focus-within {
            border-color: var(--primary);
            background: rgba(255,179,0,0.08);
        }

        .btn { 
            padding: 0.9rem 2rem; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #ffa000); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.2);
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(255, 179, 0, 0.4); 
        }
        .btn-secondary { 
            background: transparent; 
            color: var(--primary); 
            border: 1px solid var(--glass-border); 
        }
        .btn-secondary:hover { 
            background: rgba(255,179,0,0.05); 
            border-color: var(--primary);
        }

        /* Impact Map Simulation */
        .impact-map {
            width: 100%;
            height: 400px;
            background: url('https://raw.githubusercontent.com/jarifovi/Unused-Medicine-Donation-System/main/assets/world-map-dark.svg') center/contain no-repeat;
            position: relative;
            margin: 4rem 0;
            opacity: 0.4;
            filter: grayscale(1) brightness(1.5) sepia(1) hue-rotate(-20deg) saturate(3);
        }
        .pulse {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(255, 179, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); }
        }

        /* Leaderboard Styling */
        .leaderboard-list { list-style: none; padding: 0; }
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 1.2rem;
            margin-bottom: 1rem;
            background: rgba(255,179,0,0.02);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }
        .leaderboard-item:hover { 
            background: rgba(255,179,0,0.06);
            border-color: var(--primary);
            transform: scale(1.02);
        }
        .rank-num { width: 35px; font-weight: 800; color: var(--primary); }
        .points { margin-left: auto; font-weight: 700; color: var(--primary); }

        /* Scanner Modal */
        .scanner-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,5,0.98);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .scan-frame {
            width: 300px;
            height: 300px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 179, 0, 0.15);
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 20px var(--primary);
            top: 0;
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .form-group { margin-bottom: 1.8rem; }
        .form-group label { display: block; margin-bottom: 0.6rem; color: var(--primary); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .form-control {
            width: 100%;
            padding: 1.1rem;
            background: rgba(255,179,0,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); background: rgba(255,179,0,0.05); box-shadow: 0 0 15px rgba(255, 179, 0, 0.1); }

        /* Blockchain Certificate UI */
        .blockchain-card {
            border: 1px solid rgba(255, 179, 0, 0.2);
            background: rgba(255, 179, 0, 0.03);
            padding: 1.2rem;
            border-radius: 8px;
            font-family: 'monospace';
            font-size: 0.75rem;
            color: var(--primary-light);
            margin-top: 1.2rem;
            position: relative;
        }
        .blockchain-card::after {
            content: 'AUTHENTICATED';
            position: absolute;
            top: 6px; right: 6px;
            font-size: 0.55rem;
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: 900;
        }

        /* Safety Guard Notification */
        .safety-guard {
            background: rgba(255, 112, 67, 0.05);
            border: 1px solid rgba(255, 112, 67, 0.2);
            color: #ff7043;
            padding: 1.2rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .impact-ticker {
            background: rgba(255,179,0,0.05);
            border-top: 1px solid var(--glass-border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }

        .ticker-content {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }

        /* Achievement Toast */
        .toast-milestone {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: #000;
            padding: 1.2rem 2.2rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 179, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            z-index: 3000;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Climate Widget */
        .climate-widget {
            background: rgba(255,179,0,0.03);
            border: 1px solid var(--glass-border);
            padding: 1.8rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }
        .climate-info { display: flex; align-items: center; gap: 1.2rem; }
        .temp-val { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* Floating AI Chatbot */
        .ai-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 65px;
            height: 65px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 179, 0, 0.3);
            z-index: 2500;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .ai-fab:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 15px 40px rgba(255, 179, 0, 0.4); }
        .chat-box {
            position: fixed;
            bottom: 7rem;
            right: 2rem;
            width: 380px;
            height: 520px;
            z-index: 2500;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Voice Wave Animation */
        .voice-wave {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 35px;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .wave-bar {
            width: 4px;
            height: 12px;
            background: var(--primary);
            border-radius: 2px;
            animation: wave 1s infinite ease-in-out;
        }
        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 35px; }
        }

        .btn-mic {
            background: rgba(255,179,0,0.05);
            border: 1px solid var(--glass-border);
            width: 55px;
            height: 55px;
            border-radius: 8px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-mic.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 179, 0, 0.4);
        }

        /* Reward Marketplace Cards */
        .reward-card {
            background: rgba(255,179,0,0.02);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }
        .reward-card:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(255,179,0,0.04); }
        .reward-card .points-tag {
            position: absolute;
            top: 12px; right: 12px;
            background: var(--primary);
            color: #000;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 900;
        }

        /* Neural Pulse Animation */
        .neural-pulse {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            margin: 0 auto;
            animation: neural-glow 2s infinite;
        }
        @keyframes neural-glow {
            0% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(0.8); opacity: 0.3; }
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div style="border: 4px solid var(--glass); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 15px; color: var(--text-dim);">Initializing Unused Medicine Donation System...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            const [notifications, setNotifications] = useState([]);
            const [showChat, setShowChat] = useState(false);
            const [showMilestone, setShowMilestone] = useState(false);

            useEffect(() => {
                if (user) {
                    localStorage.setItem('user', JSON.stringify(user));
                    setTimeout(() => setShowMilestone(true), 3000);
                    setTimeout(() => setShowMilestone(false), 8000);
                } else {
                    localStorage.removeItem('user');
                }
            }, [user]);

            const Navbar = () => (
                <header className="navbar">
                    <div className="container" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <a onClick={() => setPage('home')} className="logo" style={{cursor:'pointer', fontSize:'1.1rem'}}>
                            <i className="fas fa-hand-holding-medical"></i> Unused Medicine Donation System
                        </a>
                        
                        <div className="nav-links" style={{display:'flex', alignItems:'center', gap:'2rem'}}>
                            <a onClick={() => setPage('home')} style={{cursor:'pointer', color: page==='home'?'var(--primary)':'#fff'}}>NETWORK</a>
                            <a onClick={() => setPage('dashboard')} style={{cursor:'pointer', color: page==='dashboard'?'var(--primary)':'#fff'}}>COMMAND</a>
                            <button onClick={() => setPage(user?'dashboard':'login')} className="btn btn-primary" style={{padding:'0.6rem 1.5rem'}}>
                                {user ? 'ACCESS HUB' : 'INITIALIZE'}
                            </button>
                        </div>
                    </div>
                    <div className="impact-ticker">
                        <div className="ticker-content">
                            • GLOBAL IMPACT: 42,000+ LIVES SECURED • NEURAL SYNC ACTIVE • BLOCKCHAIN VERIFICATION: 100% • RECENT DONATION: INSULIN (DHAKA) • RECENT DONATION: AMOXICILLIN (LONDON) • RECENT DONATION: METFORMIN (NEW YORK) • 
                        </div>
                    </div>
                </header>
            );

            const Home = () => {
                const [stats, setStats] = useState({ total: 1240, users: 450, categories: [] });
                const [leaderboard, setLeaderboard] = useState({ donors: [], ngos: [] });

                useEffect(() => {
                    fetch('api/medicines.php?action=stats').then(r=>r.json()).then(d => d.success && setStats(d.stats));
                    fetch('api/medicines.php?action=leaderboard').then(r=>r.json()).then(d => d.success && setLeaderboard(d));
                }, []);

                return (
                    <div>
                        <div className="container" style={{padding:'5rem 0', textAlign:'center'}}>
                            <h1 style={{fontSize:'4rem', fontWeight:'900', lineHeight:'1.1', background:'linear-gradient(135deg, #fff, var(--primary), var(--primary-light))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', textTransform:'uppercase', letterSpacing:'-1px'}}>
                                Unused Medicine<br/>Donation System.
                            </h1>
                            <p style={{fontSize:'1.4rem', color: 'var(--text-dim)', maxWidth:'800px', margin:'2rem auto', lineHeight:'1.6'}}>
                                Elite redistribution logistics and AI-driven synchronization for a zero-waste medical future.
                            </p>
                            
                            <div style={{display:'flex', gap:'1.5rem', justifyContent:'center', marginTop:'3rem'}}>
                                <button onClick={() => setPage('register')} className="btn btn-primary" style={{padding:'1.2rem 2.5rem', fontSize:'1.1rem'}}>Start Donating</button>
                                <button className="btn btn-secondary" style={{padding:'1.2rem 2.5rem', fontSize:'1.1rem'}}>Learn More</button>
                            </div>

                            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))', gap:'2rem', marginTop:'6rem'}}>
                                <div className="glass-card">
                                    <i className="fas fa-capsules" style={{fontSize:'2.5rem', color: 'var(--primary)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.8rem', margin:'0', fontWeight:'900'}}>{stats.total}</h3>
                                    <p style={{color: 'var(--text-dim)', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'1px'}}>Units Donated</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-bolt" style={{fontSize:'2.5rem', color: 'var(--primary)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.8rem', margin:'0', fontWeight:'900'}}>{(stats.total * 0.45).toFixed(1)}kg</h3>
                                    <p style={{color: 'var(--text-dim)', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'1px'}}>Energy Offset</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-shield-alt" style={{fontSize:'2.5rem', color: 'var(--primary)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.8rem', margin:'0', fontWeight:'900'}}>{stats.users}</h3>
                                    <p style={{color: 'var(--text-dim)', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'1px'}}>Active Guardians</p>
                                </div>
                                <div className="glass-card">
                                    <i className="fas fa-gem" style={{fontSize:'2.5rem', color: 'var(--accent2)', marginBottom:'1rem'}}></i>
                                    <h3 style={{fontSize:'2.8rem', margin:'0', fontWeight:'900'}}>{stats.total * 6}</h3>
                                    <p style={{color: 'var(--text-dim)', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'1px'}}>Lives Secured</p>
                                </div>
                            </div>

                            <div style={{marginTop:'8rem', textAlign:'left'}}>
                                <h2 style={{fontSize:'2.5rem', marginBottom:'3rem', textAlign:'center'}}>Global Live Impact</h2>
                                <div className="impact-map">
                                    <div className="pulse" style={{top:'30%', left:'45%'}}></div>
                                    <div className="pulse" style={{top:'50%', left:'70%'}}></div>
                                    <div className="pulse" style={{top:'65%', left:'25%'}}></div>
                                    <div className="pulse" style={{top:'40%', left:'80%'}}></div>
                                    <div className="pulse" style={{top:'55%', left:'15%'}}></div>
                                </div>
                            </div>

                            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(350px, 1fr))', gap:'3rem', marginTop:'6rem', textAlign:'left'}}>
                                <div className="glass-card">
                                    <h3 style={{display:'flex', alignItems:'center', gap:'0.8rem'}}>
                                        <i className="fas fa-trophy" style={{color:'var(--accent)'}}></i> Top Donors
                                    </h3>
                                    <ul className="leaderboard-list">
                                        {(leaderboard.donors.length > 0 ? leaderboard.donors : [
                                            {name: "Alexander Pierce", donations_made: 42},
                                            {name: "Sarah Jenkins", donations_made: 38},
                                            {name: "Michael Chen", donations_made: 25}
                                        ]).map((d, i) => (
                                            <li key={i} className="leaderboard-item">
                                                <span className="rank-num">#{i+1}</span>
                                                <span>{d.name}</span>
                                                <span className="points">{d.donations_made} Units</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="glass-card">
                                    <h3 style={{display:'flex', alignItems:'center', gap:'0.8rem'}}>
                                        <i className="fas fa-hospital" style={{color: 'var(--accent)'}}></i> Top Receiving NGOs
                                    </h3>
                                    <ul className="leaderboard-list">
                                        {(leaderboard.ngos.length > 0 ? leaderboard.ngos : [
                                            {name: "Global Health Aid", requests_completed: 156},
                                            {name: "Red Cross Intl", requests_completed: 142},
                                            {name: "Community Care", requests_completed: 98}
                                        ]).map((n, i) => (
                                            <li key={i} className="leaderboard-item">
                                                <span className="rank-num">#{i+1}</span>
                                                <span>{n.name}</span>
                                                <span className="points">{n.requests_completed} Served</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const [showMap, setShowMap] = useState(null);

            const Dashboard = () => {
                const [view, setView] = useState('inventory');
                const [medicines, setMedicines] = useState([]);
                const [showScanner, setShowScanner] = useState(false);

                useEffect(() => { if(view==='inventory') fetchInventory(); }, [view]);

                const fetchInventory = async () => {
                    try {
                        const res = await fetch('api/medicines.php?action=list');
                        const data = await res.json();
                        if (data.success) { setMedicines(data.medicines); return; }
                    } catch (err) {
                        setMedicines([
                            {id: 1, name: 'Amoxicillin 500mg', category: 'Tablet', description: 'Broad-spectrum antibiotic for bacterial infections.', expiry_date: '2026-10-15', donor_name: 'Dr. Smith', donor_verified: true, status: 'Available', impact: '12kg CO2 saved'},

                                <div className="form-group"><label>Access Password</label><input type="password" className="form-control" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} required /></div>
                                <div className="form-group"><label>Operational Address</label><textarea className="form-control" value={form.address} onChange={e=>setForm({...form, address:e.target.value})} required rows="2" /></div>
                                <button type="submit" className="btn btn-primary" style={{width:'100%', marginTop:'1rem', padding:'1.2rem'}}>Initialize Account</button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="app">
                    <Navbar />
                    <main style={{minHeight:'80vh'}}>
                        {page === 'home' && <Home />}
                        {page === 'login' && <Login />}
                        {page === 'register' && <Register />}
                        {page === 'dashboard' && <Dashboard />}
                    </main>
                    
                    <div className="ai-fab" onClick={() => setShowChat(!showChat)}>
                        <i className={`fas ${showChat ? 'fa-times' : 'fa-robot'}`}></i>
                    </div>

                    {showChat && (
                        <div className="chat-box glass-card">
                            <div style={{borderBottom:'1px solid var(--glass-border)', paddingBottom:'1rem', marginBottom:'1rem'}}>
                                <h4 style={{margin:0}}>Quantum Assistant</h4>
                                <span style={{fontSize:'0.7rem', color:'var(--accent)'}}>● Online | Neural Model v4.2</span>
                            </div>
                            <div style={{flex:1, overflowY:'auto', fontSize:'0.9rem'}}>
                                <div style={{background:'rgba(255,255,255,0.05)', padding:'0.8rem', borderRadius:'12px', marginBottom:'1rem'}}>
                                    Hello {user ? user.name : 'Guardian'}! How can I help you save lives today?
                                </div>
                                <div style={{background:'var(--accent)', color:'#000', padding:'0.8rem', borderRadius:'12px', marginBottom:'1rem', marginLeft:'2rem'}}>
                                    Can I donate opened medicine?
                                </div>
                                <div style={{background:'rgba(255,255,255,0.05)', padding:'0.8rem', borderRadius:'12px'}}>
                                    We only accept sealed strips or bottles for safety. Please ensure the expiry date is at least 3 months away.
                                </div>
                            </div>
                            <input type="text" className="form-control" placeholder="Ask anything..." style={{marginTop:'1rem'}} />
                        </div>
                    )}

                    {showMilestone && (
                        <div className="toast-milestone">
                            <i className="fas fa-award" style={{fontSize:'1.5rem'}}></i>
                            <div>
                                <div style={{fontSize:'0.7rem', opacity:0.8}}>MILESTONE UNLOCKED</div>
                                <div>Life Saver Level 1</div>
                            </div>
                        </div>
                    )}

                    <footer style={{padding:'4rem 0', borderTop: '1px solid var(--glass-border)', marginTop:'5rem', textAlign:'center'}}>
                        <div className="container">
                            <a className="logo" style={{justifyContent:'center', marginBottom:'1.5rem'}}>
                                <i className="fas fa-microchip"></i> MedDonate PRO
                            </a>
                            <p style={{color: 'var(--text-dim)', fontSize:'0.9rem'}}>© 2026 MedLink Systems. Engineering a waste-free medical future.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
