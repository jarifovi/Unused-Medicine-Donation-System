<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDonate Pro - World Class Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); }
        .glass-card { background: rgba(255,255,255,0.95); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid #fff; padding: 2rem; }
        .stat-card { text-align: center; padding: 1.5rem; border-radius: 20px; background: white; border-bottom: 4px solid var(--primary); }
        .chart-container { height: 300px; margin: 2rem 0; }
        .qr-container { padding: 1rem; background: white; border-radius: 12px; display: inline-block; }
        .expiry-alert { color: var(--danger); font-weight: 700; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; padding: 20px;">
            <div id="loading-spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <h2 id="status-msg">Initializing MedDonate PRO...</h2>
            <p id="error-msg" style="color: #dc3545; max-width: 500px; margin-top: 10px;"></p>
            <script>
                if (window.location.protocol === 'file:') {
                    document.getElementById('loading-spinner').style.display = 'none';
                    document.getElementById('status-msg').innerText = 'Access Denied: Local File Detected';
                    document.getElementById('error-msg').innerHTML = 'You cannot run this project by double-clicking the file. <br><br> Please move the folder to <b>xampp/htdocs</b> and access it via <b>http://localhost/Unused-Medicine-Donation-System-main/</b>';
                }
            </script>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            const [notifications, setNotifications] = useState([]);

            useEffect(() => {
                if (user) {
                    localStorage.setItem('user', JSON.stringify(user));
                    fetchNotifications();
                } else localStorage.removeItem('user');
            }, [user]);

            const fetchNotifications = async () => {
                const res = await fetch('api/medicines.php?action=notifications');
                const data = await res.json();
                if (data.success) setNotifications(data.notifications);
            };

            const Navbar = () => (
                <header className="navbar" style={{background:'#fff', borderBottom:'1px solid #eee'}}>
                    <div className="container" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <a onClick={() => setPage('home')} className="logo" style={{cursor:'pointer', color:var(--primary), fontWeight:'800', fontSize:'1.6rem'}}>
                            <i className="fas fa-microscope"></i> MedDonate PRO
                        </a>
                        <nav className="nav-links">
                            <ul style={{display:'flex', gap:'2rem', alignItems:'center', listStyle:'none'}}>
                                <li><a onClick={() => setPage('home')}>Home</a></li>
                                {user ? (
                                    <>
                                        <li><a onClick={() => setPage('dashboard')}>Dashboard</a></li>
                                        <li><a onClick={logout} className="btn-secondary">Logout</a></li>
                                    </>
                                ) : (
                                    <>
                                        <li><a onClick={() => setPage('login')}>Login</a></li>
                                        <li><a onClick={() => setPage('register')} className="btn-primary">Get Started</a></li>
                                    </>
                                )}
                            </ul>
                        </nav>
                    </div>
                </header>
            );

            const Home = () => {
                const [stats, setStats] = useState(null);
                const chartRef = useRef(null);

                useEffect(() => {
                    fetch('api/medicines.php?action=stats').then(r=>r.json()).then(d => {
                        setStats(d.stats);
                        renderChart(d.stats.categories);
                    });
                }, []);

                const renderChart = (categories) => {
                    if (!chartRef.current) return;
                    new Chart(chartRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: categories.map(c => c.category),
                            datasets: [{
                                data: categories.map(c => c.count),
                                backgroundColor: ['#007bff', '#28a745', '#ffc107', '#dc3545', '#6f42c1']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                };

                return (
                    <div className="container" style={{padding:'4rem 0'}}>
                        <div style={{textAlign:'center', marginBottom:'4rem'}}>
                            <h1 style={{fontSize:'4rem', letterSpacing:'-1px'}}>Healing the World, <br/><span style={{color:var(--primary)}}>One Donation at a Time.</span></h1>
                            <p style={{fontSize:'1.3rem', color:'#555', marginTop:'1.5rem'}}>The world's most advanced platform for medical resource optimization.</p>
                        </div>

                        {stats && (
                            <div className="cards-grid" style={{marginBottom:'4rem'}}>
                                <div className="stat-card"><h3>{stats.total}</h3><p>Total Donations</p></div>
                                <div className="stat-card"><h3>{stats.users}</h3><p>Active Users</p></div>
                                <div className="stat-card"><h3>{stats.completed}</h3><p>Saved Lives</p></div>
                            </div>
                        )}

                        <div className="glass-card">
                            <h3>Analytics Insight</h3>
                            <div className="chart-container">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                    </div>
                );
            };

            const Dashboard = () => {
                const [medicines, setMedicines] = useState([]);
                const [view, setView] = useState('inventory');
                const [wishlist, setWishlist] = useState('');

                useEffect(() => { fetchInventory(); }, []);
                const fetchInventory = async () => {
                    const res = await fetch('api/medicines.php?action=list');
                    const data = await res.json();
                    if (data.success) setMedicines(data.medicines);
                };

                const addToWishlist = async () => {
                    await fetch('api/medicines.php?action=add_wishlist', {
                        method:'POST',
                        body: JSON.stringify({ name: wishlist })
                    });
                    alert('Added to your wishlist!');
                    setWishlist('');
                };

                return (
                    <div className="container" style={{padding:'3rem 0'}}>
                        <div className="section-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'3rem'}}>
                            <div>
                                <h2>{user.name} <span style={{fontSize:'0.9rem', color:'#999'}}>| {user.type}</span></h2>
                                <p style={{fontSize:'0.9rem'}}>Member since 2025</p>
                            </div>
                            <div style={{display:'flex', gap:'1rem'}}>
                                {user.type === 'NGO' && (
                                    <div style={{display:'flex', gap:'0.5rem'}}>
                                        <input type="text" placeholder="Wishlist medicine..." value={wishlist} onChange={e=>setWishlist(e.target.value)} style={{padding:'0.5rem', borderRadius:'8px', border:'1px solid #ddd'}} />
                                        <button onClick={addToWishlist} className="btn-primary" style={{padding:'0.5rem'}}>Add</button>
                                    </div>
                                )}
                                <button onClick={()=>setView('inventory')} className="btn btn-secondary">Inventory</button>
                                <button onClick={()=>setView('donate')} className="btn btn-primary">Donate</button>
                            </div>
                        </div>

                        {view === 'inventory' && (
                            <div className="cards-grid">
                                {medicines.map(m => (
                                    <MedicineCard key={m.id} m={m} user={user} onRefresh={fetchInventory} />
                                ))}
                            </div>
                        )}

                        {view === 'donate' && <DonateForm onComplete={()=>{setView('inventory'); fetchInventory();}} />}
                    </div>
                );
            };

            const MedicineCard = ({ m, user, onRefresh }) => {
                const [qrCode, setQrCode] = useState(null);
                const qrRef = useRef(null);

                const handleRequest = async () => {
                    const res = await fetch('api/medicines.php?action=request', {
                        method: 'POST',
                        body: JSON.stringify({ medicine_id: m.id })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Request successful! Admin will approve shortly.');
                        onRefresh();
                    }
                };

                return (
                    <div className="glass-card medicine-card" style={{padding:'1.5rem'}}>
                        <div style={{display:'flex', justifyContent:'space-between'}}>
                            <span className="badge" style={{background:'#e3f2fd', color:'#1976d2'}}>{m.category}</span>
                            {new Date(m.expiry_date) < new Date() && <span className="expiry-alert">EXPIRED</span>}
                        </div>
                        <h4 style={{margin:'1rem 0'}}>{m.name}</h4>
                        <p style={{fontSize:'0.9rem', color:'#666'}}>{m.description}</p>
                        <div style={{marginTop:'1.5rem', fontSize:'0.85rem', borderTop:'1px solid #eee', paddingTop:'1rem'}}>
                            <p><i className="fas fa-user-tag"></i> Donor: {m.donor_name}</p>
                            <p><i className="fas fa-clock"></i> Expires: {m.expiry_date}</p>
                        </div>
                        {user.type === 'NGO' && <button onClick={handleRequest} className="btn btn-primary" style={{width:'100%', marginTop:'1rem'}}>Secure Request</button>}
                    </div>
                );
            };

            const DonateForm = ({ onComplete }) => {
                const [form, setForm] = useState({ name: '', category: 'Tablet', description: '', expiry_date: '', quantity: 1 });
                const handleSubmit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/medicines.php?action=donate', { method:'POST', body: JSON.stringify(form) });
                    const data = await res.json();
                    if (data.success) onComplete();
                };
                return (
                    <div className="glass-card" style={{maxWidth:'600px', margin:'0 auto'}}>
                        <h3>Pro-Donation Submission</h3>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group"><label>Medicine Name</label><input type="text" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required /></div>
                            <div className="form-group"><label>Category</label><select value={form.category} onChange={e=>setForm({...form, category:e.target.value})}><option>Tablet</option><option>Syrup</option><option>Injection</option></select></div>
                            <div className="form-group"><label>Expiry Date</label><input type="date" value={form.expiry_date} onChange={e=>setForm({...form, expiry_date:e.target.value})} required /></div>
                            <div className="form-group"><label>Description</label><textarea value={form.description} onChange={e=>setForm({...form, description:e.target.value})} required /></div>
                            <div className="form-group"><label>Medicine Photo</label><input type="file" disabled /> <small>(Verified feature active)</small></div>
                            <button type="submit" className="btn btn-primary" style={{width:'100%'}}>Verify & Donate</button>
                        </form>
                    </div>
                );
            };

            const logout = async () => { 
                await fetch('api/auth.php?action=logout');
                setUser(null); 
                setPage('home'); 
            };

            return (
                <div className="app">
                    <Navbar />
                    <div className="page-container">
                        {page === 'home' && <Home />}
                        {page === 'dashboard' && <Dashboard />}
                        {page === 'login' && <div className="container" style={{padding:'5rem 0'}}><LoginForm onLogin={u=>{setUser(u); setPage('dashboard');}} /></div>}
                        {page === 'register' && <div className="container" style={{padding:'5rem 0'}}><RegisterForm onComplete={()=>setPage('login')} /></div>}
                    </div>
                    <footer className="footer" style={{background:'#fff', borderTop:'1px solid #eee'}}><div className="container" style={{textAlign:'center', padding:'2rem'}}><p>&copy; 2025 MedDonate PRO. The global standard in medical resource management.</p></div></footer>
                </div>
            );
        }

        const LoginForm = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const handleSubmit = async (e) => {
                e.preventDefault();
                const res = await fetch('api/auth.php?action=login', { method:'POST', body: JSON.stringify({email, password}) });
                const data = await res.json();
                if (data.success) onLogin(data.user); else alert(data.message);
            };
            return (
                <div className="glass-card" style={{maxWidth:'400px', margin:'0 auto'}}>
                    <h2>Pro Login</h2>
                    <form onSubmit={handleSubmit}>
                        <div className="form-group"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                        <div className="form-group"><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%'}}>Enter Console</button>
                    </form>
                </div>
            );
        };

        const RegisterForm = ({ onComplete }) => {
            const [form, setForm] = useState({ name: '', email: '', password: '', type: 'Individual', phone: '', address: '' });
            const handleSubmit = async (e) => {
                e.preventDefault();
                const res = await fetch('api/auth.php?action=register', { method:'POST', body: JSON.stringify(form) });
                const data = await res.json();
                if (data.success) onComplete(); else alert(data.message);
            };
            return (
                <div className="glass-card" style={{maxWidth:'500px', margin:'0 auto'}}>
                    <h2>Global Registration</h2>
                    <form onSubmit={handleSubmit}>
                        <div className="form-group"><label>Full Name</label><input type="text" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required /></div>
                        <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} required /></div>
                        <div className="form-group"><label>Password</label><input type="password" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} required /></div>
                        <div className="form-group"><label>User Type</label><select value={form.type} onChange={e=>setForm({...form, type:e.target.value})}><option value="Individual">Individual</option><option value="NGO">NGO</option></select></div>
                        <div className="form-group"><label>Registration Cert (NGO)</label><input type="file" disabled /></div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%'}}>Complete Setup</button>
                    </form>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
