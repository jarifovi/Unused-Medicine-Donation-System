<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDonate - Advanced Medicine Donation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .page-container { min-height: 80vh; padding: 2rem 0; }
        .form-card { max-width: 500px; margin: 0 auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        .medicine-card { border: 1px solid #eee; padding: 1.5rem; border-radius: 10px; background: #fff; transition: transform 0.2s; }
        .medicine-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 0.5rem; }
        .badge-tablet { background: #e3f2fd; color: #1976d2; }
        .badge-syrup { background: #f3e5f5; color: #7b1fa2; }
        .badge-injection { background: #fff3e0; color: #f57c00; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);

            useEffect(() => {
                if (user) localStorage.setItem('user', JSON.stringify(user));
                else localStorage.removeItem('user');
            }, [user]);

            const Navbar = () => (
                <header className="navbar">
                    <div className="container">
                        <a onClick={() => setPage('home')} className="logo" style={{cursor:'pointer'}}>
                            <i className="fas fa-heartbeat"></i> MedDonate
                        </a>
                        <nav className="nav-links">
                            <ul>
                                <li><a onClick={() => setPage('home')}>Home</a></li>
                                {!user ? (
                                    <>
                                        <li><a onClick={() => setPage('login')} className="btn-secondary">Login</a></li>
                                        <li><a onClick={() => setPage('register')} className="btn-primary">Sign Up</a></li>
                                    </>
                                ) : (
                                    <>
                                        <li><a onClick={() => setPage('dashboard')}>Dashboard</a></li>
                                        <li><a onClick={logout} className="btn-secondary">Logout</a></li>
                                    </>
                                )}
                            </ul>
                        </nav>
                    </div>
                </header>
            );

            const Login = () => {
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/auth.php?action=login', {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setUser(data.user);
                        setPage('dashboard');
                    } else alert(data.message);
                };

                return (
                    <div className="form-card">
                        <h2>Login</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                            <div className="form-group"><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                            <button type="submit" className="btn btn-primary" style={{width:'100%'}}>Login</button>
                        </form>
                    </div>
                );
            };

            const Register = () => {
                const [form, setForm] = useState({ name: '', email: '', password: '', type: 'Individual', phone: '', address: '' });

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/auth.php?action=register', {
                        method: 'POST',
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Registration successful!');
                        setPage('login');
                    } else alert(data.message);
                };

                return (
                    <div className="form-card">
                        <h2>Create Account</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group"><label>Full Name</label><input type="text" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} required /></div>
                            <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form, email: e.target.value})} required /></div>
                            <div className="form-group"><label>Password</label><input type="password" value={form.password} onChange={e=>setForm({...form, password: e.target.value})} required /></div>
                            <div className="form-group"><label>Phone</label><input type="text" value={form.phone} onChange={e=>setForm({...form, phone: e.target.value})} required /></div>
                            <div className="form-group"><label>User Type</label>
                                <select value={form.type} onChange={e=>setForm({...form, type: e.target.value})}>
                                    <option value="Individual">Individual Donor</option>
                                    <option value="NGO">NGO Receiver</option>
                                </select>
                            </div>
                            <div className="form-group"><label>Address</label><textarea value={form.address} onChange={e=>setForm({...form, address: e.target.value})} required /></div>
                            <button type="submit" className="btn btn-primary" style={{width:'100%'}}>Sign Up</button>
                        </form>
                    </div>
                );
            };

            const Dashboard = () => {
                const [medicines, setMedicines] = useState([]);
                const [myRequests, setMyRequests] = useState([]);
                const [view, setView] = useState('inventory'); // inventory, my_donations, my_requests

                useEffect(() => {
                    fetchInventory();
                    if (user.type === 'NGO') fetchMyRequests();
                }, []);

                const fetchInventory = async () => {
                    const res = await fetch('api/medicines.php?action=list');
                    const data = await res.json();
                    if (data.success) setMedicines(data.medicines);
                };

                const fetchMyRequests = async () => {
                    const res = await fetch('api/medicines.php?action=my_requests');
                    const data = await res.json();
                    if (data.success) setMyRequests(data.requests);
                };

                const handleRequest = async (id) => {
                    const res = await fetch('api/medicines.php?action=request', {
                        method: 'POST',
                        body: JSON.stringify({ medicine_id: id })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Request submitted!');
                        fetchInventory();
                        fetchMyRequests();
                    } else alert(data.message);
                };

                return (
                    <div className="container">
                        <div className="section-header">
                            <h2>Welcome, {user.name}</h2>
                            <div style={{display:'flex', gap:'0.5rem'}}>
                                <button onClick={() => setView('inventory')} className={`btn ${view==='inventory'?'btn-primary':'btn-secondary'}`}>Inventory</button>
                                {user.type === 'NGO' && <button onClick={() => setView('my_requests')} className={`btn ${view==='my_requests'?'btn-primary':'btn-secondary'}`}>My Requests</button>}
                                <button onClick={() => setView('donate')} className={`btn ${view==='donate'?'btn-primary':'btn-secondary'}`}>Donate</button>
                            </div>
                        </div>

                        {view === 'inventory' && (
                            <div className="cards-grid">
                                {medicines.map(m => (
                                    <div key={m.id} className="medicine-card">
                                        <span className={`badge badge-${m.category.toLowerCase()}`}>{m.category}</span>
                                        <h4>{m.name}</h4>
                                        <p>{m.description}</p>
                                        <p><small><i className="fas fa-calendar-alt"></i> Expires: {m.expiry_date}</small></p>
                                        <p><small><i className="fas fa-user"></i> Donor: {m.donor_name}</small></p>
                                        <p><strong>Qty: {m.quantity}</strong></p>
                                        {user.type === 'NGO' && <button onClick={() => handleRequest(m.id)} className="btn btn-secondary" style={{width:'100%', marginTop:'1rem'}}>Request</button>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'my_requests' && (
                            <div className="cards-grid">
                                {myRequests.map(r => (
                                    <div key={r.id} className="medicine-card">
                                        <h4>{r.medicine_name}</h4>
                                        <p>Status: <strong>{r.status}</strong></p>
                                        <p><small>Requested on: {new Date(r.request_date).toLocaleDateString()}</small></p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'donate' && <DonateForm onComplete={() => setView('inventory')} />}
                    </div>
                );
            };

            const DonateForm = ({ onComplete }) => {
                const [form, setForm] = useState({ name: '', category: 'Tablet', description: '', expiry_date: '', quantity: 1 });

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    const res = await fetch('api/medicines.php?action=donate', {
                        method: 'POST',
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Thank you for your donation!');
                        onComplete();
                    } else alert(data.message);
                };

                return (
                    <div className="form-card" style={{maxWidth:'800px'}}>
                        <h3>Donate Medicine</h3>
                        <form onSubmit={handleSubmit} style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1.5rem'}}>
                            <div className="form-group"><label>Medicine Name</label><input type="text" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} required /></div>
                            <div className="form-group"><label>Category</label>
                                <select value={form.category} onChange={e=>setForm({...form, category: e.target.value})}>
                                    <option value="Tablet">Tablet</option>
                                    <option value="Syrup">Syrup</option>
                                    <option value="Injection">Injection</option>
                                    <option value="Ointment">Ointment</option>
                                </select>
                            </div>
                            <div className="form-group" style={{gridColumn:'span 2'}}><label>Description</label><textarea value={form.description} onChange={e=>setForm({...form, description: e.target.value})} required /></div>
                            <div className="form-group"><label>Expiry Date</label><input type="date" value={form.expiry_date} onChange={e=>setForm({...form, expiry_date: e.target.value})} required /></div>
                            <div className="form-group"><label>Quantity</label><input type="number" value={form.quantity} onChange={e=>setForm({...form, quantity: e.target.value})} required /></div>
                            <button type="submit" className="btn btn-primary" style={{gridColumn:'span 2'}}>Submit Donation</button>
                        </form>
                    </div>
                );
            };

            const logout = () => {
                setUser(null);
                setPage('home');
            };

            return (
                <div className="app">
                    <Navbar />
                    <div className="page-container">
                        {page === 'home' && (
                            <main className="main-content">
                                <section className="hero">
                                    <div className="container">
                                        <h1>Save Lives, Donate Medicine.</h1>
                                        <p>A bridge between individual donors and NGOs in need.</p>
                                        {!user && <a onClick={() => setPage('register')} className="btn btn-primary" style={{cursor:'pointer'}}>Join Us Today</a>}
                                    </div>
                                </section>
                            </main>
                        )}
                        {page === 'login' && <Login />}
                        {page === 'register' && <Register />}
                        {page === 'dashboard' && <Dashboard />}
                    </div>
                    <footer className="footer"><div className="container"><p>&copy; 2025 MedDonate. All rights reserved.</p></div></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
